<!DOCTYPE html>
<html>
<head>
    <title>Churn Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4 shadow-lg bg-secondary">

                <h2 class="text-center mb-4">Customer Churn Predictor</h2>

                <form action="/predict" method="post">

                    <!-- Tenure -->
                    <div class="mb-3">
                        <label>Tenure (Months)</label>
                        <input type="number" name="tenure" class="form-control" required>
                    </div>

                    <!-- Monthly Charges -->
                    <div class="mb-3">
                        <label>Monthly Charges</label>
                        <input type="number" step="0.01" name="MonthlyCharges" class="form-control" required>
                    </div>

                    <!-- Total Charges -->
                    <div class="mb-3">
                        <label>Total Charges</label>
                        <input type="number" step="0.01" name="TotalCharges" class="form-control" required>
                    </div>

                    <!-- Contract Type -->
                    <div class="mb-3">
                        <label>Contract Type</label>
                        <select name="Contract" class="form-control">
                            <option value="Month-to-month">Month-to-month</option>
                            <option value="One year">One year</option>
                            <option value="Two year">Two year</option>
                        </select>
                    </div>

                    <!-- Internet Service -->
                    <div class="mb-3">
                        <label>Internet Service</label>
                        <select name="InternetService" class="form-control">
                            <option value="DSL">DSL</option>
                            <option value="Fiber optic">Fiber optic</option>
                            <option value="No">No</option>
                        </select>
                    </div>

                    <!-- Payment Method -->
                    <div class="mb-3">
                        <label>Payment Method</label>
                        <select name="PaymentMethod" class="form-control">
                            <option value="Electronic check">Electronic check</option>
                            <option value="Mailed check">Mailed check</option>
                            <option value="Bank transfer (automatic)">Bank transfer</option>
                            <option value="Credit card (automatic)">Credit card</option>
                        </select>
                    </div>

                    <button class="btn btn-primary w-100">Predict</button>

                </form>

                {% if prediction_text %}
                <div class="mt-4 text-center">
                    <h4>{{ prediction_text }}</h4>
                </div>
                {% endif %}

                <hr>
                <p class="text-center">ML-powered churn prediction system 🚀</p>

            </div>

        </div>
    </div>
</div>

</body>
</html>
